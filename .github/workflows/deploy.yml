name: Deploy PWA to GitHub Pages

# Publica o build de produção do App Butterfly no GitHub Pages.
#
# IMPORTANTE: o ambiente `github-pages` deste repo só autoriza deploy a partir
# da branch de desenvolvimento (política de "Deployment branches"). Deploys da
# main são REJEITADOS no portão do ambiente (job `deploy` falha em ~2s, sem
# runner) — era esse o "X vermelho" recorrente, enquanto os runs da branch é que
# realmente publicavam o site (todos verdes). Por isso publicamos a partir da
# branch. Para publicar a partir da main, libere a main em
# Settings → Environments → github-pages → Deployment branches.
on:
  push:
    branches:
      - claude/app-butterfly-mobile-pwa-emj1xk
  workflow_dispatch:

# Permissões necessárias para o deploy via GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Um deploy por vez; NÃO cancela um deploy em andamento (recomendação oficial
# do GitHub Pages — cancelar no meio também gera falha no ambiente).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Base path do GitHub Pages: https://<user>.github.io/<repo>/
          VITE_BASE: /${{ github.event.repository.name }}/
          # As credenciais do Supabase vêm de .env.production (commitado; anon key é
          # pública por design — a RLS protege os dados).
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
