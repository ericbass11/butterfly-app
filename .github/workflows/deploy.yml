name: Deploy PWA to GitHub Pages

# Publica o build de produção do App Butterfly no GitHub Pages.
# Publica SOMENTE a partir da main (o site em produção sai da main). Publicar
# também de branches fazia dois runs disputarem o mesmo ambiente `github-pages`
# (que só aceita um deploy por vez): um vencia e publicava, o outro falhava na
# hora — o "X vermelho" fantasma no Actions. Um único gatilho resolve.
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Permissões necessárias para o deploy via GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Um deploy por vez; NÃO cancela um deploy em andamento (recomendação oficial
# do GitHub Pages — cancelar no meio também gera falha no ambiente).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Base path do GitHub Pages: https://<user>.github.io/<repo>/
          VITE_BASE: /${{ github.event.repository.name }}/
          # As credenciais do Supabase vêm de .env.production (commitado; anon key é
          # pública por design — a RLS protege os dados).
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
