name: Deploy PWA to GitHub Pages

# Publica o build de produção do App Butterfly no GitHub Pages.
# Roda no push para a branch de desenvolvimento e na main, ou manualmente.
on:
  push:
    branches:
      - main
      - claude/app-butterfly-mobile-pwa-emj1xk
  workflow_dispatch:

# Permissões necessárias para o deploy via GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante um único deploy por vez
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Base path do GitHub Pages: https://<user>.github.io/<repo>/
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
