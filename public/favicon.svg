<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d4536"/>
      <stop offset="1" stop-color="#05231a"/>
    </linearGradient>
    <linearGradient id="wingTop" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#4be3d1"/>
      <stop offset="0.5" stop-color="#4aa0ff"/>
      <stop offset="1" stop-color="#8b6bff"/>
    </linearGradient>
    <linearGradient id="wingBot" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#ffd05a"/>
      <stop offset="0.55" stop-color="#ff7a59"/>
      <stop offset="1" stop-color="#e85aa6"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbe9c8"/>
      <stop offset="1" stop-color="#caa15e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <circle cx="256" cy="262" r="180" fill="url(#glow)"/>

  <!-- Borboleta simétrica (metade direita espelhada) -->
  <g stroke="#06231a" stroke-width="7" stroke-linejoin="round">
    <g id="half">
      <path d="M256 168 C 300 74 404 66 440 116 C 470 158 420 244 330 244 C 292 244 250 220 256 168 Z" fill="url(#wingTop)"/>
      <path d="M256 258 C 302 300 402 322 408 376 C 412 414 350 430 312 408 C 280 388 256 330 256 258 Z" fill="url(#wingBot)"/>
    </g>
    <use href="#half" transform="matrix(-1 0 0 1 512 0)"/>
  </g>

  <!-- corpo + cabeça + antenas -->
  <g fill="none" stroke="#f3e6c8" stroke-width="9" stroke-linecap="round">
    <path d="M256 150 C 236 150 232 172 240 132"/>
    <path d="M256 150 C 276 150 280 172 272 132"/>
  </g>
  <rect x="247" y="150" width="18" height="258" rx="9" fill="url(#body)" stroke="#06231a" stroke-width="6"/>
  <circle cx="256" cy="150" r="16" fill="url(#body)" stroke="#06231a" stroke-width="6"/>

  <!-- brilhos -->
  <g fill="#ffffff">
    <circle cx="408" cy="150" r="6" opacity="0.9"/>
    <circle cx="120" cy="300" r="5" opacity="0.75"/>
    <circle cx="360" cy="330" r="4" opacity="0.7"/>
    <circle cx="150" cy="170" r="4" opacity="0.6"/>
  </g>
</svg>
